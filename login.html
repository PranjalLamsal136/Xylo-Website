<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XYLO</title>
    <link rel="shortcut icon" type="x-icon" href="img/logo/logo.jpg">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/eb49ab7274.js" crossorigin="anonymous"></script>
</head>
<body>
   
     <input type="checkbox" id="cart-toggle">
    <label for="cart-toggle" class="cart-overlay"></label>

    <div class="cart-sidebar">
        <div class="cart-sidebar-header">
            <h2>YOUR CART</h2>
            <label for="cart-toggle" class="cart-close">✕</label>
        </div>
        <div class="cart-sidebar-body">
            <p class="cart-empty">Your cart is empty.</p>
        </div>
        <div class="cart-sidebar-footer">
            <p class="cart-total">TOTAL: <i class="fa-sharp fa-solid fa-rupee-sign" style="color: rgb(15, 15, 16);"></i>0</p>
            <button class="cart-checkout-btn">CHECKOUT</button>
        </div>
    </div>
<!--Navbar Section-->
    <header>
        <div class="navbar">
            <nav>
                <div id="logo">
                    <a href="#"><img src="img/logo/logo.png"></a>
                </div>
                <div class="container primary">
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="product.html">Products</a></li>
                        <li><a href="contact.html">Contact Us</a></li>
                        <li><a href="account.html">Account</a></li>
                    </ul>
                    <label for="cart-toggle" class="cart">
                        <i class="fa-solid fa-cart-arrow-down fa-xl" style="color: white;"></i>
                    </label>
                </div>
            </nav>
        </div>
    </header>

    <main class="auth-page">
        <div class="auth-branding">
            <h2>XYLO</h2>
            <p>Minimal. Modern. Timeless.</p>
        </div>
        <div class="auth-form-side">
            <div class="auth-form-box">
                <h1>Sign In</h1>
                <p class="auth-subtitle">Welcome back to XYLO</p>
                <form method="post">
                    <div class="auth-input-group">
                        <input type="email" id="email" name="email" placeholder="Email address" required>
                    </div>
                    <div class="auth-input-group">
                        <input type="password" id="password" name="password" placeholder="Password" required>
                    </div>
                    <div class="auth-checkbox">
                        <input type="checkbox" id="checkbox" name="checkbox">
                        <label for="checkbox">Remember for 30 days</label>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <input type="submit" value="Sign In">
                    <p class="auth-switch">Don't have an account? <a href="account.html">Sign Up</a></p>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
